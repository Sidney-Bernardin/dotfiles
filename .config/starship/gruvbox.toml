# Get editor completions based on the config schema.
"$schema" = 'https://starship.rs/config-schema.json'

format = "[ $username@$hostname [¯¡░](bg:240 fg:66)](bold bg:66 fg:232)[ $git_branch [¯¡░](bg:237 fg:240)](bg:240 fg:223)[ $directory[¯¡░](bg:default fg:237)](bg:237 fg:66) "

# Don't insert blank line between prompts.
add_newline = false

[git_branch]
style = "bg:240 fg:223"
format = "$symbol$branch(:$remote_branch)"

[directory]
style = "bg:237 fg:66"
read_only_style	= "bg:237 fg:66"
truncation_length = 15

[username]
style_user = "bold bg:66 fg:232"
style_root = "bold bg:66 fg:232"
format = "$user"
show_always = true

[hostname]
ssh_only = false
format = "$ssh_symbol$hostname"
